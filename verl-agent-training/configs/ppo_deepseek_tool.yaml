# =============================================================================
# PPO + DeepSeek MoE Tool-Calling Agent — verl Hydra Config (Backup)
# =============================================================================
# Alternative using PPO. Requires a Critic model (more GPU memory).
#
# Usage:
#   python3 -m verl.trainer.main_ppo \
#       --config-path=configs \
#       --config-name=ppo_deepseek_tool
# =============================================================================

algorithm:
  adv_estimator: gae                     # GAE for PPO (requires critic)

data:
  train_files:
    - data/train_prompts.jsonl
  val_files:
    - data/eval_prompts.jsonl
  train_batch_size: 128                  # smaller due to critic memory
  max_prompt_length: 2048
  max_response_length: 4096
  return_raw_chat: true
  shuffle: true

actor_rollout_ref:
  model:
    path: deepseek-ai/DeepSeek-V2.5
    trust_remote_code: true

  actor:
    strategy: megatron
    ppo_micro_batch_size_per_gpu: 1      # smaller for PPO (actor + critic)
    ppo_mini_batch_size: 64
    grad_clip: 1.0
    ppo_epochs: 4                        # PPO inner epochs
    optim:
      lr: 5.0e-7                         # smaller LR for PPO actor
      weight_decay: 0.01
    lr_scheduler:
      type: cosine
      warmup_steps: 50
      min_lr_ratio: 0.1
    megatron:
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 2
      expert_model_parallel_size: 8
      sequence_parallel: true

  rollout:
    name: vllm
    n: 1                                 # PPO: single sample per prompt
    temperature: 0.7
    top_p: 0.95
    max_new_tokens: 4096
    tensor_model_parallel_size: 8
    gpu_memory_utilization: 0.80         # less memory for rollout (critic needs space)

    multi_turn:
      enable: true
      max_assistant_turns: 10
      max_user_turns: 10
      max_parallel_calls: 5
      max_tool_response_length: 2048
      format: chatml
      tool_config_path: configs/tool_config.yaml

    agent:
      default_agent_loop: tool_agent
      num_workers: 8

    server:
      timeout: 60
      max_attempts: 3

  ref:
    log_prob_micro_batch_size_per_gpu: 4

# ---- Critic ----
critic:
  model:
    path: deepseek-ai/DeepSeek-V2.5     # same architecture as actor
    trust_remote_code: true
  strategy: megatron
  ppo_micro_batch_size_per_gpu: 1
  optim:
    lr: 5.0e-6                           # critic LR typically higher
    weight_decay: 0.01
  lr_scheduler:
    type: cosine
    warmup_steps: 50

# ---- Reward ----
reward:
  custom_reward_function:
    path: src/reward_function.py
    name: compute_score

# ---- PPO-specific ----
algorithm_config:
  ppo:
    eps_clip: 0.2
    value_clip: 0.2
    kl_ctrl:
      type: fixed
      kl_coef: 0.02
    entropy_coeff: 0.01
    gamma: 1.0
    lam: 0.95                            # GAE lambda

# ---- Trainer ----
trainer:
  total_epochs: 15
  save_freq: 200
  test_freq: 100
  project_name: verl-agent-tool-calling-ppo
  experiment_name: ppo_deepseek_tool
  logger:
    - wandb
  nnodes: 8
  n_gpus_per_node: 8
  save_path: checkpoints/
