# =============================================================================
# GRPO + DeepSeek MoE Tool-Calling Agent — verl Hydra Config
# =============================================================================
# Conforms to verl v0.7+ config schema.
#
# Usage:
#   python3 -m verl.trainer.main_ppo \
#       --config-path=configs \
#       --config-name=grpo_deepseek_tool \
#       actor_rollout_ref.model.path=Qwen/Qwen2.5-7B-Instruct   # override model
#
# For single-GPU dev, override:
#   actor_rollout_ref.model.path=Qwen/Qwen2.5-3B-Instruct
#   trainer.nnodes=1 trainer.n_gpus_per_node=8
#   actor_rollout_ref.rollout.name=vllm
#   actor_rollout_ref.actor.strategy=fsdp
# =============================================================================

# ---- Algorithm ----
algorithm:
  adv_estimator: grpo               # GRPO: no critic needed

# ---- Data ----
data:
  train_files:
    - data/train_prompts.jsonl
  val_files:
    - data/eval_prompts.jsonl
  train_batch_size: 256              # total across all DP ranks
  max_prompt_length: 2048
  max_response_length: 4096
  return_raw_chat: true              # needed for multi-turn / AgentLoop
  shuffle: true

# ---- Actor + Rollout + Reference (colocated) ----
actor_rollout_ref:
  model:
    path: deepseek-ai/DeepSeek-V2.5
    # path: Qwen/Qwen2.5-7B-Instruct      # for single-node dev
    trust_remote_code: true

  actor:
    strategy: megatron                     # "fsdp" for dev, "megatron" for prod
    ppo_micro_batch_size_per_gpu: 2
    ppo_mini_batch_size: 128
    grad_clip: 1.0
    optim:
      lr: 1.0e-6
      weight_decay: 0.01
      betas: [0.9, 0.999]
    lr_scheduler:
      type: cosine
      warmup_steps: 50
      min_lr_ratio: 0.1
    # Megatron parallelism
    megatron:
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 2
      expert_model_parallel_size: 8        # MoE EP
      sequence_parallel: true
      context_parallel_size: 1             # enable for long context

  rollout:
    name: vllm                             # or "sglang"
    n: 8                                   # GRPO group_size: generate 8 per prompt
    temperature: 0.7
    top_p: 0.95
    max_new_tokens: 4096
    tensor_model_parallel_size: 8          # TP for inference (full node)
    gpu_memory_utilization: 0.85

    # ---- Server mode (required for AgentLoop) ----
    # vllm_rollout_mode: server            # for vLLM
    # sglang_rollout_mode: server          # for SGLang

    # ---- Multi-turn / AgentLoop ----
    multi_turn:
      enable: true
      max_assistant_turns: 10              # max LLM generation rounds
      max_user_turns: 10                   # max tool response rounds
      max_parallel_calls: 5               # max parallel tool calls per turn
      max_tool_response_length: 2048       # truncate long tool responses
      max_total_tool_calls: 50             # total tool calls per episode
      rollout_timeout: 120.0               # seconds
      format: chatml                       # tool call format parser
      tool_config_path: configs/tool_config.yaml

    # ---- Agent ----
    agent:
      default_agent_loop: tool_agent       # verl built-in ToolAgentLoop
      # default_agent_loop: tool_call_agent  # our custom (after register)
      num_workers: 8                       # concurrent agent workers

    # ---- Server config ----
    server:
      timeout: 60
      max_attempts: 3
      retry_delay: 2
      max_connections: 1000
      max_start_wait_time: 300.0

  ref:
    log_prob_micro_batch_size_per_gpu: 4

# ---- Reward ----
reward:
  custom_reward_function:
    path: src/reward_function.py
    name: compute_score

# ---- GRPO-specific ----
algorithm_config:
  grpo:
    eps_clip: 0.2                          # PPO-style clip ratio
    kl_ctrl:
      type: fixed
      kl_coef: 0.01
    entropy_coeff: 0.01

# ---- Trainer ----
trainer:
  total_epochs: 15
  save_freq: 200
  test_freq: 100
  project_name: verl-agent-tool-calling
  experiment_name: grpo_deepseek_tool
  logger:
    - wandb
  nnodes: 8                               # 8 nodes
  n_gpus_per_node: 8                       # 64 GPUs total
  save_path: checkpoints/
  default_hdfs_path: null
